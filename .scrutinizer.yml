build:
  environment:
    php:
      version: 8.2

  dependencies:
    before:
      - composer install --no-interaction --prefer-dist --no-dev

  tests:
    override:
      - php-scrutinizer-run

checks:
  php: true

tools:
  php_code_sniffer: false
  php_cs_fixer: false
  php_cpd: false
  php_loc: false
  php_mess_detector: false
  php_pdepend: false
  sensiolabs_security_checker: false

filter:
  excluded_paths:
    - vendor/*
    - tests/*